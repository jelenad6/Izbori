syntax = "proto3";

option java_multiple_files = true;
option java_package = "rs.raf.pds.faulttolerance.gRPC";

service ElectionService {

  rpc SubmitResult(VotingResultRequest) returns (ElectionResponse);

  rpc GetStatistics(StatisticsRequest) returns (StatisticsResponse);

}

enum ElectionRequestType {
  SUBMIT_RESULT = 0;
  GET_STATISTICS = 1;
}

enum RequestStatus {
  STATUS_OK = 0;
  UPDATE_REJECTED_NOT_LEADER = 1;
  INVALID_VOTE_COUNT = 2;
  POLLING_STATION_NEEDS_REPEAT = 3;
  POLLING_STATION_BLOCKED = 4;
  WITHDRAWAL_REJECT_NOT_SUFFICIENT_AMOUNT = 5;
}

message CandidateVote {
  string candidate_name = 1;
  int32 votes = 2;
}

message VotingResultRequest {

  int32 request_id = 1;

  int32 election_id = 2;

  int32 polling_station_id = 3;

  string controller_id = 4;

  int32 total_voters = 5;

  int32 invalid_votes = 6;

  repeated CandidateVote candidate_votes = 7;

  ElectionRequestType op_type = 8;
}

message ElectionResponse {

  RequestStatus status = 1;

  int32 request_id = 2;

  string message = 3;
}

message StatisticsRequest {

  int32 request_id = 1;
   int32 election_id = 2;
}

message CandidateStatistics {

  string candidate_name = 1;

  int32 total_votes = 2;
}

message StatisticsResponse {

  RequestStatus status = 1;

  float turnout_percentage = 2;

  float processed_polling_stations_percentage = 3;

  int32 repeat_polling_stations = 4;

  repeated CandidateStatistics candidate_statistics = 5;

  int32 election_id = 6;

  string election_type = 7;
}